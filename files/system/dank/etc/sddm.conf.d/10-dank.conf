# Minimal SDDM config for the izzy-os DankMaterialShell image.
# The greeter runs on X11 (xorg-x11-server-Xorg) for reliability; the selected
# Hyprland session itself is pure Wayland.
[General]
# Default to the Hyprland (DankMaterialShell) wayland session.
Session=hyprland.desktop

[Theme]
# Cursor used on the greeter.
CursorTheme=Adwaita

[Users]
# Remember the last user/session selection.
RememberLastUser=true
RememberLastSession=true
