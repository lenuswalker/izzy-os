# Default hypridle config for the izzy-os DankMaterialShell image.
# Locking is delegated to the DMS lock screen via its IPC.
general {
    lock_cmd = dms ipc call lock lock
    before_sleep_cmd = dms ipc call lock lock
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 300                              # 5 min -> lock
    on-timeout = dms ipc call lock lock
}

listener {
    timeout = 360                              # 6 min -> screen off
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 1800                             # 30 min -> suspend
    on-timeout = systemctl suspend
}
