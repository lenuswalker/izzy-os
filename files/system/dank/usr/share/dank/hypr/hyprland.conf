# Default Hyprland config for the izzy-os DankMaterialShell image.
# Copied into ~/.config/hypr/ on first login -- edit freely, it won't be
# overwritten again. DankMaterialShell (DMS) replaces the bar, notifications,
# launcher, lock screen, OSDs, etc.; it is started by `dms run` below.
# Full DMS keybind/IPC reference: https://danklinux.com/docs/dankmaterialshell

################################### Monitors ###################################
monitor = , preferred, auto, 1

################################# Environment ##################################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = NIXOS_OZONE_WL,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

################################### Autostart ##################################
# Export the Wayland session env into the systemd user manager so session-bound
# user services (notably dms.service) start with WAYLAND_DISPLAY etc. set. This
# also activates graphical-session.target.
exec-once = uwsm finalize

# DankMaterialShell (bar / launcher / notifications / lock / OSD / wallpaper) is
# started by dms.service (a graphical-session.target user unit), not from here.
#exec-once = dms run

# Polkit authentication agent.
exec-once = systemctl --user start hyprpolkitagent.service

# Idle / lock daemon.
exec-once = hypridle

# Clipboard history (feeds the DMS clipboard widget).
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#################################### Input ####################################
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = windows, 1, 4, easeOutQuint
    animation = fade, 1, 4, default
    animation = workspaces, 1, 5, easeOutQuint
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

#################################### Keybinds ##################################
$mod = SUPER
$terminal = ghostty
$fileManager = thunar

# Core
bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive,
bind = $mod, E, exec, $fileManager
bind = $mod, V, togglefloating,
bind = $mod, F, fullscreen,
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,
bind = $mod SHIFT, M, exec, uwsm stop          # log out of the session

# DankMaterialShell surfaces (via the `dms` IPC wrapper -> qs -c dms ipc)
bind = $mod, Space, exec, dms ipc call spotlight toggle        # app launcher
bind = $mod, C, exec, dms ipc call clipboard toggle            # clipboard history
bind = $mod, N, exec, dms ipc call notifications toggle        # notification center
bind = $mod, M, exec, dms ipc call control-center toggle       # control center
bind = $mod, comma, exec, dms ipc call settings toggle         # settings
bind = $mod SHIFT, N, exec, dms ipc call notepad toggle        # notepad
bind = $mod, L, exec, dms ipc call lock lock                   # lock screen

# Screenshots (hyprshot saves to the Pictures dir)
bind = , Print, exec, hyprshot -m output
bind = $mod, Print, exec, hyprshot -m region
bind = $mod SHIFT, Print, exec, hyprshot -m window

# Audio / brightness via DMS OSDs (fall back to media keys)
bindel = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 3
bindel = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 3
bindl  = , XF86AudioMute, exec, dms ipc call audio mute
bindl  = , XF86AudioMicMute, exec, dms ipc call audio micmute
bindel = , XF86MonBrightnessUp, exec, dms ipc call brightness increment 5 ""
bindel = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5 ""

# Media transport
bindl = , XF86AudioPlay, exec, dms ipc call mpris playPause
bindl = , XF86AudioNext, exec, dms ipc call mpris next
bindl = , XF86AudioPrev, exec, dms ipc call mpris previous

# Focus movement
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspaces 1-10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to workspace 1-10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Mouse drag to move/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
