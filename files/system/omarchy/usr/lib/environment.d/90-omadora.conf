# omadora's helper scripts (omadora-theme-set, waybar click actions, keybinds)
# read OMADORA_PATH to find themes, templates and tools. Point it at the
# read-only vendored tree so it's set for every graphical/user session from the
# very first login (the user's ~/.config/uwsm/env sets the same value, but only
# after first login has populated it).
OMADORA_PATH=/usr/share/omadora
