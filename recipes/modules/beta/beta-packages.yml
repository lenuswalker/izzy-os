type: dnf
repos:
  copr:
    - atim/starship
  nonfree: negativo17
install:
  packages:
    # Utility
    - age
    - bash-completion
    - bootc
    - distrobox
    - fastfetch
    - neovim
    - nu
    - podman-compose
    - python3-neovim
    - starship
    - tuned
    - tuned-ppd
    - vim

    # Codecs
    - ffmpeg
    - ffmpeg-libs
    - heif-pixbuf-loader
    - libavcodec
    - libheif
    #- pipewire-libs-extra

    # Audio
    - pipewire
    - wireplumber

    # Themes
    - adw-gtk3-theme
    - gtk-murrine-engine
    - sassc

    # Fonts
    - rsms-inter-fonts

    # Needed for winapps
    - dialog
    - nmap-ncat

remove:
  packages:
    - firefox
    - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)