type: containerfile
snippets:
  - |
    # 1. Identify versions and install build tools
    RUN KERNEL_VERSION=$(ls /lib/modules | tail -n 1) && \
        FEDORA_VERSION=$(rpm -E %fedora) && \
        dnf install -y \
            kernel-devel-${KERNEL_VERSION} \
            gcc \
            gcc-c++ \
            make \
            libdrm-devel \
            git \
            elfutils-libelf-devel && \
        # 2. Build EVDI Kernel Module from Source
        # Source build matches your exact kernel and bypasses root-user safety checks in RPMs
        git clone https://github.com/DisplayLink/evdi.git /tmp/evdi && \
        cd /tmp/evdi/module && \
        make KDIR=/usr/lib/modules/${KERNEL_VERSION}/build && \
        mkdir -p /usr/lib/modules/${KERNEL_VERSION}/extra && \
        cp evdi.ko /usr/lib/modules/${KERNEL_VERSION}/extra/ && \
        depmod -a ${KERNEL_VERSION} && \
        # 3. Dynamically create the repo file based on image version (e.g., 43, 44)
        # Using a direct echo to avoid printf placeholder escaping issues
        echo -e "[negativo17-dynamic]\nname=negativo17-dynamic\nbaseurl=https://negativo17.org/repos/multimedia/fedora-${FEDORA_VERSION}/x86_64/\nenabled=1\ngpgcheck=0" > /etc/yum.repos.d/negativo17-dynamic.repo && \
        # 4. Force metadata refresh and download (DNF5 compliant)
        dnf clean all --enablerepo=negativo17-dynamic && \
        dnf makecache --enablerepo=negativo17-dynamic && \
        mkdir -p /tmp/rpms && \
        dnf --enablerepo=negativo17-dynamic --disablerepo="*" download --destdir /tmp/rpms displaylink libevdi && \
        # 5. Install userspace with --nodeps to skip the broken 'akmod-evdi' script
        rpm -ivh --nodeps /tmp/rpms/*.rpm && \
        # 6. Enable the userspace service
        systemctl enable displaylink.service && \
        # 7. Final Cleanup
        rm -rf /tmp/evdi /tmp/rpms /etc/yum.repos.d/negativo17-dynamic.repo && \
        dnf remove -y kernel-devel gcc gcc-c++ make git elfutils-libelf-devel && \
        dnf clean all