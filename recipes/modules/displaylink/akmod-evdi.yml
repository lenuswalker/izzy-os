type: containerfile
snippets:
  - |
    # 1. Install build dependencies and identify the current kernel
    RUN KERNEL_VERSION=$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}') && \
        dnf install -y \
            kernel-devel-${KERNEL_VERSION} \
            gcc \
            gcc-c++ \
            make \
            libdrm-devel \
            git \
            elfutils-libelf-devel && \
        # 2. Build the kernel module from source
        git clone https://github.com/DisplayLink/evdi.git /tmp/evdi && \
        cd /tmp/evdi/module && \
        make KDIR=/usr/lib/modules/${KERNEL_VERSION}/build && \
        mkdir -p /usr/lib/modules/${KERNEL_VERSION}/extra && \
        cp evdi.ko /usr/lib/modules/${KERNEL_VERSION}/extra/ && \
        depmod -a ${KERNEL_VERSION} && \
        # 3. Manually define the Negativo17 repository
        # Fedora 43 often 404s; we point to the stable Fedora 41 path for the userspace driver
        printf "[negativo17-multimedia]\nname=negativo17 - Multimedia\nbaseurl=https://negativo17.org/repos/multimedia/fedora-41/\$basearch/\nenabled=1\ngpgcheck=1\ngpgkey=https://negativo17.org/repos/RPM-GPG-KEY-slaanesh\n" > /etc/yum.repos.d/negativo17-multimedia.repo && \
        # 4. Install displaylink userspace driver and cleanup
        dnf install -y displaylink --exclude=akmod-evdi && \
        rm -rf /tmp/evdi && \
        dnf remove -y kernel-devel gcc gcc-c++ make git elfutils-libelf-devel && \
        dnf clean all