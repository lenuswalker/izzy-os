type: containerfile
snippets:
  - |
    # 1. Install build dependencies and identify the current image kernel
    RUN KERNEL_VERSION=$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}') && \
        dnf install -y \
            kernel-devel-${KERNEL_VERSION} \
            gcc \
            make \
            libdrm-devel \
            git \
            elfutils-libelf-devel && \
        # 2. Clone the EVDI source code
        git clone https://github.com/DisplayLink/evdi.git /tmp/evdi && \
        cd /tmp/evdi && \
        # 3. Build the module for the specific kernel in the image
        make -j$(nproc) && \
        # 4. Manually install the module to the extra directory
        mkdir -p /usr/lib/modules/${KERNEL_VERSION}/extra && \
        cp module/evdi.ko /usr/lib/modules/${KERNEL_VERSION}/extra/ && \
        depmod -a ${KERNEL_VERSION} && \
        # 5. Cleanup build-only packages and temporary files
        rm -rf /tmp/evdi && \
        dnf remove -y kernel-devel gcc make git elfutils-libelf-devel && \
        dnf clean all