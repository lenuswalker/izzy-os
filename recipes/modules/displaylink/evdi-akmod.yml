type: containerfile
snippets:
  - |
    # Add the repository
    RUN dnf install -y https://negativo17.org/repos/fedora-multimedia/fedora-multimedia.repo && \
    # Identify the kernel version matching the current image build
    KERNEL_VERSION=$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}') && \
    # Install build tools and build the module
    dnf install -y \
        akmod-evdi \
        kernel-devel-${KERNEL_VERSION} \
        akmods \
        gcc \
        make \
        elfutils-libelf-devel && \
    akmods --force --kernels "${KERNEL_VERSION}" && \
    # Cleanup to keep the image small
    dnf remove -y kernel-devel gcc make elfutils-libelf-devel && \
    dnf clean all