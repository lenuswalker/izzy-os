type: containerfile
snippets:
  - |
    # 1. Install build dependencies and identifying the kernel
    RUN KERNEL_VERSION=$(rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}') && \
        dnf install -y \
            kernel-devel-${KERNEL_VERSION} \
            gcc \
            gcc-c++ \
            make \
            libdrm-devel \
            git \
            elfutils-libelf-devel && \
        # 2. Build the kernel module from source
        git clone https://github.com/DisplayLink/evdi.git /tmp/evdi && \
        cd /tmp/evdi/module && \
        make KDIR=/usr/lib/modules/${KERNEL_VERSION}/build && \
        mkdir -p /usr/lib/modules/${KERNEL_VERSION}/extra && \
        cp evdi.ko /usr/lib/modules/${KERNEL_VERSION}/extra/ && \
        depmod -a ${KERNEL_VERSION} && \
        # 3. Install the userspace service while EXCLUDING the problematic akmod package
        dnf install -y https://negativo17.org/repos/fedora-multimedia/fedora-multimedia.repo && \
        dnf install -y displaylink --exclude=akmod-evdi && \
        # 4. Cleanup
        rm -rf /tmp/evdi && \
        dnf remove -y kernel-devel gcc gcc-c++ make git elfutils-libelf-devel && \
        dnf clean all