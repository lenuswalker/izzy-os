type: dnf
repos:
  copr:
    # wayblue's own Hyprland set, kept current for the latest Fedora (built
    # against Fedora 44's libdisplay-info 0.3 / aquamarine 0.11). solopasha's
    # COPR lags new Fedora releases, so its aquamarine breaks here.
    - craftidore/wayblueorg-hyprland
    - errornointernet/walker   # Walker application launcher (Omarchy's launcher)
    - atim/lazygit             # lazygit TUI
    - atim/starship            # starship prompt
install:
  packages:
    # Hyprland ecosystem (craftidore/wayblueorg-hyprland).
    # NB: this set ships Hyprland as `hyprland-git`; aquamarine + the hypr*
    # libraries come in as dependencies. uwsm/satty are not in this COPR and
    # are installed separately in omarchy-hypr-extras.yml.
    - hyprland-git
    - hyprlock
    - hypridle
    - hyprsunset
    - hyprpicker
    - hyprpolkitagent
    - xdg-desktop-portal-hyprland

    # Wayland desktop shell
    - waybar
    - mako
    - swaybg
    - walker
    - xdg-desktop-portal-gtk
    - libqalculate
    - brightnessctl
    - playerctl
    - pamixer
    - wireplumber
    - slurp
    - grim
    # NB: satty is installed from solopasha in omarchy-hypr-extras.yml

    # Input methods
    - fcitx5
    - fcitx5-gtk
    - fcitx5-qt

    # File manager + thumbnails
    - nautilus
    - sushi
    - ffmpegthumbnailer
    - gvfs-mtp

    # Media / viewers
    - mpv
    - evince
    - imv

    # Browser
    - chromium

    # Secrets / polkit
    - gnome-keyring

    # Bluetooth
    - blueman

    # Login: GDM (the Silverblue default) stays the display manager and lists
    # the Hyprland session from /usr/share/wayland-sessions. Reliable Wayland
    # greeter, nothing to install/enable here. Plus XWayland + boot splash.
    - xorg-x11-server-Xwayland  # XWayland shim so legacy X11 apps run under Hyprland
    - plymouth
    - plymouth-system-theme
    - plymouth-plugin-script

    # Terminal + CLI tooling
    - alacritty
    - tmux
    - starship
    - fastfetch
    - btop
    - bat
    - ripgrep
    - fd-find
    - fzf
    - eza
    - zoxide
    - jq
    - xmlstarlet
    - wl-clipboard
    - man-db
    - less
    - whois
    - plocate
    - bash-completion
    - unzip
    - wget2
    - curl
    - git
    - gawk
    - ImageMagick

    # Editors + dev
    - neovim
    - python3-neovim
    - gh
    - lazygit

    # Utility
    - age          # encryption (used by chezmoi)
    - distrobox
    - tuned        # tuning daemon (leave PPD active; no tuned-ppd to avoid conflict)

    # Theming (Adwaita-dark ships with GNOME; adw-gtk3-theme covers GTK apps)
    - kvantum
    - yaru-icon-theme
    - adw-gtk3-theme
