type: dnf
repos:
  copr:
    # sdegler/hyprland ships the full Hyprland 0.55.x stack (incl. satty + uwsm)
    # for current Fedora, built against F44's libdisplay-info 0.3. This is the
    # COPR the maintained elpritchos/omadora config is written against, so the
    # config matches the Hyprland version (unlike solopasha, which is frozen at
    # Oct-2025 / Hyprland 0.51 and broken on F44).
    - sdegler/hyprland
    - atim/starship   # prompt (omadora uses starship if present)
install:
  # tuned weakly pulls tuned-ppd, which conflicts with the base
  # power-profiles-daemon (both provide ppd-service). Keep PPD as the active
  # power manager and install plain tuned only.
  exclude:
    - tuned-ppd
  packages:
    # --- Hyprland ecosystem (sdegler/hyprland) ---
    - hyprland
    - hyprlock
    - hypridle
    - hyprpicker
    - hyprpolkitagent
    - hyprshot
    - hyprsunset
    - xdg-desktop-portal-hyprland
    - uwsm           # Universal Wayland Session Manager (how omadora launches Hyprland)
    - satty          # screenshot annotation

    # --- Wayland desktop (matches elpritchos/omadora's package set) ---
    - waybar
    - mako
    - swaybg
    - wofi           # launcher used by omadora
    - wiremix        # audio mixer TUI
    - wf-recorder    # screen recording
    - brightnessctl
    - playerctl
    - slurp
    - xdg-desktop-portal-gtk
    - xdg-terminal-exec
    - xdg-user-dirs

    # --- Input methods ---
    - fcitx5
    - fcitx5-configtool
    - fcitx5-gtk
    - fcitx5-qt

    # --- File manager / viewers / browser ---
    - nautilus
    - sushi
    - gvfs-mtp
    - gvfs-smb
    - mpv
    - evince
    - imv
    - chromium

    # --- Secrets / login support / boot splash ---
    - gnome-keyring
    - xorg-x11-server-Xwayland   # XWayland shim so legacy X11 apps run under Hyprland
    - plymouth
    - plymouth-system-theme
    - plymouth-plugin-script
    - power-profiles-daemon

    # --- Terminal + CLI tooling ---
    - alacritty
    - starship
    - fastfetch
    - btop
    - bat
    - ripgrep
    - fd-find
    - fzf
    - eza
    - zoxide
    - du-dust
    - gum
    - tldr
    - jq
    - xmlstarlet
    - wl-clipboard
    - plocate
    - unzip
    - tar
    - wget2
    - curl
    - git
    - ImageMagick
    - bind-utils
    - iputils
    - iwd
    - pciutils
    - usbutils
    - libxkbcommon-utils
    - dbus-tools

    # --- Editors + apps ---
    - neovim
    - gnome-calculator
    - pipx

    # --- Theming ---
    - kvantum-qt5
    - yaru-icon-theme
    - adw-gtk3-theme

    # --- Fonts ---
    - cascadia-code-nf-fonts
    - cascadia-mono-nf-fonts
    - fontawesome-fonts-all
    - google-noto-fonts-common
    - google-noto-sans-fonts
    - google-noto-color-emoji-fonts

    # --- Utility (requested) ---
    - age
    - distrobox
    - tuned
