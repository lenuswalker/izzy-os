type: dnf
repos:
  copr:
    # wayblue's own Hyprland set, kept current for the latest Fedora (built
    # against Fedora 44's libdisplay-info 0.3 / aquamarine 0.11). solopasha's
    # COPR lags new Fedora releases, so its aquamarine breaks here.
    - craftidore/wayblueorg-hyprland
    - errornointernet/walker   # Walker application launcher (Omarchy's launcher)
    - atim/lazygit             # lazygit TUI
    - atim/starship            # starship prompt
install:
  packages:
    # Hyprland ecosystem (craftidore/wayblueorg-hyprland).
    # NB: this set ships Hyprland as `hyprland-git`; aquamarine + the hypr*
    # libraries come in as dependencies. uwsm/satty are not in this COPR and
    # are installed separately in omarchy-hypr-extras.yml.
    - hyprland-git
    - hyprlock
    - hypridle
    - hyprsunset
    - hyprpicker
    - hyprpolkitagent
    - xdg-desktop-portal-hyprland

    # Wayland desktop shell
    - waybar
    - mako
    - swaybg
    - walker
    - xdg-desktop-portal-gtk
    - libqalculate
    - brightnessctl
    - playerctl
    - pamixer
    - wireplumber
    - slurp
    - grim
    - satty

    # Input methods
    - fcitx5
    - fcitx5-gtk
    - fcitx5-qt

    # File manager + thumbnails
    - nautilus
    - sushi
    - ffmpegthumbnailer
    - gvfs-mtp

    # Media / viewers
    - mpv
    - evince
    - imv

    # Browser
    - chromium

    # Secrets / polkit
    - gnome-keyring

    # Bluetooth
    - blueman

    # Login (SDDM with a Wayland greeter via Weston) + boot splash
    - sddm
    - sddm-wayland-generic      # runs the SDDM greeter on Weston (no Xorg server)
    - xorg-x11-server-Xwayland  # XWayland shim so legacy X11 apps run under Hyprland
    - qt6-qtsvg
    - qt6-qt5compat
    - qt6-qtdeclarative
    - plymouth
    - plymouth-system-theme
    - plymouth-plugin-script

    # Terminal + CLI tooling
    - alacritty
    - tmux
    - starship
    - fastfetch
    - btop
    - bat
    - ripgrep
    - fd-find
    - fzf
    - eza
    - zoxide
    - jq
    - xmlstarlet
    - wl-clipboard
    - man-db
    - less
    - whois
    - plocate
    - bash-completion
    - unzip
    - wget2
    - curl
    - git
    - gawk
    - ImageMagick

    # Editors + dev
    - neovim
    - python3-neovim
    - gh
    - lazygit

    # Theming (Adwaita-dark ships with GNOME; adw-gtk3-theme covers GTK apps)
    - kvantum
    - yaru-icon-theme
    - adw-gtk3-theme
