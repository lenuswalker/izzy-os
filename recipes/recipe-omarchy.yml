# image will be published to ghcr.io/<user>/<name>
name: izzy-os-omarchy
# description will be included in the image's metadata
description: Atomic Fedora image mimicking Omarchy (Hyprland) for the Dell XPS 13.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/silverblue-main
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  # Omarchy / Hyprland software stack (installs git used by omarchy-config)
  - from-file: modules/omarchy/omarchy-packages.yml
  - from-file: modules/omarchy/omarchy-hypr-extras.yml
  - from-file: modules/omarchy/omarchy-fonts.yml

  # Dell XPS 13 + Intel hardware enablement
  - from-file: modules/dell/dell-xps-packages.yml
  - from-file: modules/intel/intel-packages.yml
  - from-file: modules/intel/intel-specific.yml

  # WinApps prerequisites (podman-compose, dialog, etc.)
  - from-file: modules/winapps/winapps-packages.yml

  # Default applications (common flatpak set; includes FreeRDP for WinApps)
  - from-file: modules/common/common-flatpaks.yml

  # Hyprland (uwsm) session entry + session-start wrapper -> /usr/share/...
  # GDM (Silverblue default) stays the display manager and lists this session.
  - from-file: modules/omarchy/omarchy-files.yml
  # WinApps first-login installer script -> /tmp
  - from-file: modules/winapps/winapps-files.yml

  # Vendor the Omarchy look-and-feel and seed /etc/skel (needs git from packages)
  - from-file: modules/omarchy/omarchy-config.yml

  # Pull personal dotfiles, but with skip policy so the omadora-seeded
  # /etc/skel config wins on any conflict
  - from-file: modules/omarchy/omarchy-chezmoi.yml

  # Enable the WinApps first-login user service
  - from-file: modules/winapps/winapps-systemd.yml

  - type: signing
